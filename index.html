<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERDA SCANNER - Single File</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React, ReactDOM, Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Framer Motion (UMD) -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        :root {
            --bg: #0A0A0B;
            --zinc-900: #18181B;
            --zinc-800: #27272A;
            --zinc-700: #3F3F46;
            --zinc-400: #A1A1AA;
            --zinc-500: #71717A;
            --emerald-500: #10B981;
            --red-500: #EF4444;
            --amber-500: #F59E0B;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #E4E4E7;
            margin: 0;
            overflow-x: hidden;
        }

        .selection-emerald::selection {
            background-color: rgba(16, 185, 129, 0.3);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #27272A;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3F3F46;
        }
    </style>
</head>
<body class="selection-emerald">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { GoogleGenAI, Type } from "https://esm.run/@google/genai";

        const { useState, useEffect, useRef, useMemo, useCallback } = React;
        const { motion, AnimatePresence } = window.Motion || { motion: ({children, ...props}) => <div {...props}>{children}</div>, AnimatePresence: ({children}) => <>{children}</> };

        // --- Constants ---
        const VERDA_PROTOCOL = `
PROTOKÓŁ VERDA 8.3 (Early Shift) - Health Profile Rules:

1. Model Operacyjny: Pobudka 05:00, praca 06:00. Wysoka wydajność.
2. Kluczowe Leki/Suplementy: Brintellix (rano na czczo), Berberyna (20 min przed posiłkiem), Magnez (rano i wieczór), Maca (rano), D3+K2, Omega-3, Kolagen + Wit. C (wieczór), Ketrel + Zincas (noc).
3. Dieta i Składniki:
   - Preferowane: Tłuste białka (jaja, boczek, ser Bursztyn, udziec z indyka), czarny czosnek, kiełki brokułu (surowe), makaron konjac, chia, jogurt grecki, sól himalajska, ocet jabłkowy, masło klarowane (Ghee), oliwa extra virgin.
   - Unikać: Żeń-szeń (bezwzględnie!), cukier (używać ksylitolu), wysokie IG (Berberyna wymaga niskiego IG), składniki drażniące żołądek (chyba że z Ghee).
4. Interakcje:
   - Unikać składników wypłukujących magnez (nadmiar kofeiny bez osłony, silne zioła moczopędne bez soli).
   - Unikać składników blokujących wchłanianie (np. śluz z siemienia lnianego musi być 40 min po posiłku).
5. Cel: Stabilizacja glikemii, ochrona bariery śluzowej, regeneracja tkanek (pięty), wyciszenie układu nerwowego (zrywy hipnagogiczne).

ZADANIE: Zanalizuj produkt(y) na podstawie zdjęcia etykiety LUB opisu użytkownika. Jeśli użytkownik wymienia kilka produktów, porównaj je i wskaż "mniejsze zło" w kontekście Protokółu Verda 8.3.
Zwróć odpowiedź w formacie JSON:
{
  "isComparison": boolean,
  "products": [
    {
      "productName": "Nazwa produktu",
      "verdict": "KUPUJ" | "UNIKAJ" | "Z ROZWAGĄ",
      "healthScore": 0-100,
      "summary": "Krótkie podsumowanie",
      "pros": ["zalety"],
      "cons": ["wady"],
      "ingredientsAnalysis": "Analiza składu",
      "protocolFit": "Dopasowanie do protokołu",
      "detailedRisks": [
        {
          "ingredient": "Nazwa składnika",
          "riskLevel": "LOW" | "MEDIUM" | "HIGH" | "BENEFICIAL",
          "reason": "Dlaczego ten składnik jest ryzykowny lub korzystny w Protokole Verda 8.3"
        }
      ]
    }
  ],
  "comparisonSummary": "Jeśli isComparison=true, tutaj wpisz porównanie i wybór mniejszego zła",
  "recommendation": "Konkretna rekomendacja (który wybrać)"
}
`;

        const STORAGE_KEY = 'verda_scanner_history';
        const API_KEY_STORAGE_KEY = 'verda_gemini_api_key';
        const MAX_HISTORY_ITEMS = 50;

        // --- Icons ---
        const Icon = ({ name, className, ...props }) => {
            const [iconHtml, setIconHtml] = useState('');
            
            useEffect(() => {
                if (window.lucide) {
                    const icon = window.lucide.icons[name];
                    if (icon) {
                        setIconHtml(icon.toSvg({ class: className, ...props }));
                    }
                }
            }, [name, className]);

            return <span dangerouslySetInnerHTML={{ __html: iconHtml }} />;
        };

        // --- Services ---
        const historyService = {
            saveItem(result, image, description) {
                const history = this.getHistory();
                const newItem = {
                    id: crypto.randomUUID(),
                    timestamp: Date.now(),
                    result,
                    image,
                    description
                };
                const updatedHistory = [newItem, ...history].slice(0, MAX_HISTORY_ITEMS);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(updatedHistory));
                return updatedHistory;
            },
            getHistory() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (!stored) return [];
                try { return JSON.parse(stored); } catch (e) { return []; }
            },
            deleteItem(id) {
                const history = this.getHistory();
                const updatedHistory = history.filter(item => item.id !== id);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(updatedHistory));
                return updatedHistory;
            },
            clearHistory() { localStorage.removeItem(STORAGE_KEY); }
        };

        // --- Components ---

        const CameraView = ({ onCapture, onClose }) => {
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const [stream, setStream] = useState(null);
            const [isCaptured, setIsCaptured] = useState(false);
            const [error, setError] = useState(null);

            useEffect(() => {
                const startCamera = async () => {
                    try {
                        const mediaStream = await navigator.mediaDevices.getUserMedia({
                            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
                            audio: false,
                        });
                        setStream(mediaStream);
                        if (videoRef.current) videoRef.current.srcObject = mediaStream;
                    } catch (err) {
                        setError("Nie można uzyskać dostępu do kamery.");
                    }
                };
                startCamera();
                return () => stream?.getTracks().forEach(track => track.stop());
            }, []);

            const capture = () => {
                if (videoRef.current && canvasRef.current) {
                    const video = videoRef.current;
                    const canvas = canvasRef.current;
                    const context = canvas.getContext('2d');
                    if (context) {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        context.drawImage(video, 0, 0, canvas.width, canvas.height);
                        const imageData = canvas.toDataURL('image/jpeg', 0.7);
                        setIsCaptured(true);
                        setTimeout(() => onCapture(imageData), 600);
                    }
                }
            };

            return (
                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[100] bg-black flex flex-col">
                    <div className="relative flex-grow overflow-hidden flex items-center justify-center bg-zinc-950">
                        {error ? (
                            <div className="p-8 text-center space-y-6 max-w-xs">
                                <div className="w-16 h-16 rounded-full bg-red-500/10 flex items-center justify-center mx-auto">
                                    <Icon name="X" className="w-8 h-8 text-red-500" />
                                </div>
                                <p className="text-zinc-400 text-sm">{error}</p>
                                <button onClick={onClose} className="w-full py-3 bg-white/10 rounded-2xl font-medium">Zamknij</button>
                            </div>
                        ) : (
                            <>
                                <video ref={videoRef} autoPlay playsInline className="w-full h-full object-cover" />
                                <canvas ref={canvasRef} className="hidden" />
                                {!isCaptured && (
                                    <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                        <motion.div animate={{ scale: [1.2, 1], opacity: [0, 0.3] }} transition={{ repeat: Infinity, duration: 2, repeatType: 'reverse' }} className="w-48 h-48 border-2 border-emerald-500/50 rounded-3xl" />
                                    </div>
                                )}
                            </>
                        )}
                        <button onClick={onClose} className="absolute top-6 right-6 p-3 bg-black/40 backdrop-blur-md rounded-full text-white"><Icon name="X" className="w-6 h-6" /></button>
                    </div>
                    <div className="h-40 bg-black flex items-center justify-center relative px-6">
                        <button onClick={capture} disabled={isCaptured || !!error} className={`relative w-20 h-20 rounded-full border-4 flex items-center justify-center transition-all ${isCaptured ? 'border-emerald-500 bg-emerald-500' : 'border-white bg-white/10'}`}>
                            {isCaptured ? <Icon name="Check" className="w-10 h-10 text-white" /> : <Icon name="Camera" className="w-8 h-8 text-white" />}
                            {!isCaptured && !error && <div className="absolute -inset-2 border border-white/20 rounded-full animate-pulse" />}
                        </button>
                    </div>
                </motion.div>
            );
        };

        // --- Main App ---

        const App = () => {
            const [apiKey, setApiKey] = useState(localStorage.getItem(API_KEY_STORAGE_KEY) || '');
            const [showApiKeyInput, setShowApiKeyInput] = useState(!apiKey);
            const [image, setImage] = useState(null);
            const [textDescription, setTextDescription] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [history, setHistory] = useState([]);
            const [showHistory, setShowHistory] = useState(false);
            const [isCameraOpen, setIsCameraOpen] = useState(false);
            const fileInputRef = useRef(null);
            const recognitionRef = useRef(null);

            useEffect(() => {
                setHistory(historyService.getHistory());
                
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    const recognition = new SpeechRecognition();
                    recognition.continuous = false;
                    recognition.interimResults = false;
                    recognition.lang = 'pl-PL';
                    recognition.onresult = (event) => {
                        const transcript = event.results[0][0].transcript;
                        setTextDescription(transcript);
                        analyzeProduct(undefined, transcript);
                    };
                    recognition.onerror = (event) => {
                        setIsRecording(false);
                        setError(`Błąd rozpoznawania mowy: ${event.error}`);
                    };
                    recognition.onend = () => setIsRecording(false);
                    recognitionRef.current = recognition;
                }
            }, []);

            const saveApiKey = (key) => {
                localStorage.setItem(API_KEY_STORAGE_KEY, key);
                setApiKey(key);
                setShowApiKeyInput(false);
            };

            const analyzeProduct = async (imageData, description) => {
                const dataToAnalyze = imageData || image;
                const textToAnalyze = description || textDescription;
                if (!dataToAnalyze && !textToAnalyze) return;
                if (!apiKey) { setShowApiKeyInput(true); return; }

                setIsAnalyzing(true);
                setError(null);

                try {
                    const ai = new GoogleGenAI({ apiKey });
                    const model = "gemini-3-flash-preview";
                    const currentTime = new Date().toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
                    const currentDate = new Date().toLocaleDateString('pl-PL');
                    const parts = [
                        { text: VERDA_PROTOCOL },
                        { text: `AKTUALNY CZAS: ${currentDate}, ${currentTime}` },
                        { text: "PRZEPROWADŹ SZCZEGÓŁOWĄ ANALIZĘ." }
                    ];
                    if (dataToAnalyze) parts.push({ inlineData: { mimeType: "image/jpeg", data: dataToAnalyze.split(',')[1] } });
                    if (textToAnalyze) parts.push({ text: `DANE: ${textToAnalyze}` });

                    const response = await ai.models.generateContent({
                        model,
                        contents: [{ parts }],
                        config: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: Type.OBJECT,
                                required: ['isComparison', 'products'],
                                properties: {
                                    isComparison: { type: Type.BOOLEAN },
                                    products: {
                                        type: Type.ARRAY,
                                        items: {
                                            type: Type.OBJECT,
                                            required: ['productName', 'verdict', 'healthScore', 'summary', 'pros', 'cons', 'ingredientsAnalysis', 'protocolFit', 'detailedRisks'],
                                            properties: {
                                                productName: { type: Type.STRING },
                                                verdict: { type: Type.STRING, enum: ['KUPUJ', 'UNIKAJ', 'Z ROZWAGĄ'] },
                                                healthScore: { type: Type.NUMBER },
                                                summary: { type: Type.STRING },
                                                pros: { type: Type.ARRAY, items: { type: Type.STRING } },
                                                cons: { type: Type.ARRAY, items: { type: Type.STRING } },
                                                ingredientsAnalysis: { type: Type.STRING },
                                                protocolFit: { type: Type.STRING },
                                                detailedRisks: {
                                                    type: Type.ARRAY,
                                                    items: {
                                                        type: Type.OBJECT,
                                                        required: ['ingredient', 'riskLevel', 'reason'],
                                                        properties: {
                                                            ingredient: { type: Type.STRING },
                                                            riskLevel: { type: Type.STRING, enum: ['LOW', 'MEDIUM', 'HIGH', 'BENEFICIAL'] },
                                                            reason: { type: Type.STRING }
                                                        }
                                                    }
                                                }
                                            }
                                        }
                                    },
                                    comparisonSummary: { type: Type.STRING },
                                    recommendation: { type: Type.STRING }
                                }
                            }
                        }
                    });

                    const parsedResult = JSON.parse(response.text);
                    setResult(parsedResult);
                    setHistory(historyService.saveItem(parsedResult, dataToAnalyze, textToAnalyze));
                } catch (err) {
                    setError(err.message || "Błąd podczas analizy.");
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const reset = () => { setImage(null); setTextDescription(null); setResult(null); setError(null); setShowHistory(false); };

            if (showApiKeyInput) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6">
                        <div className="w-full max-w-md bg-zinc-900 border border-white/10 rounded-3xl p-8 space-y-6">
                            <div className="text-center space-y-2">
                                <Icon name="ShieldCheck" className="w-12 h-12 text-emerald-500 mx-auto" />
                                <h2 className="text-2xl font-bold">Wymagany Klucz API</h2>
                                <p className="text-zinc-400 text-sm">Podaj swój Gemini API Key, aby rozpocząć skanowanie.</p>
                            </div>
                            <input 
                                type="password" 
                                placeholder="Wklej klucz tutaj..." 
                                className="w-full bg-black border border-white/10 rounded-2xl p-4 text-white focus:border-emerald-500 outline-none"
                                onKeyDown={(e) => e.key === 'Enter' && saveApiKey(e.target.value)}
                            />
                            <button 
                                onClick={(e) => saveApiKey(e.currentTarget.previousElementSibling.value)}
                                className="w-full py-4 bg-emerald-500 text-black font-bold rounded-2xl hover:bg-emerald-400 transition-colors"
                            >
                                Zapisz i kontynuuj
                            </button>
                            <p className="text-[10px] text-zinc-500 text-center">Klucz zostanie zapisany lokalnie w Twojej przeglądarce.</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="sticky top-0 z-50 bg-[#0A0A0B]/80 backdrop-blur-md">
                        <div className="max-w-xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <Icon name="ShieldCheck" className="w-8 h-8 text-emerald-500" />
                                <h1 className="text-lg font-bold tracking-tight">VERDA SCANNER</h1>
                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={() => setShowHistory(!showHistory)} className={`p-2 rounded-full ${showHistory ? 'bg-emerald-500/20 text-emerald-500' : 'text-zinc-400'}`}><Icon name="History" className="w-5 h-5" /></button>
                                {(image || textDescription) && <button onClick={reset} className="p-2 text-zinc-400"><Icon name="RefreshCw" className="w-5 h-5" /></button>}
                                <button onClick={() => setShowApiKeyInput(true)} className="p-2 text-zinc-400"><Icon name="Settings" className="w-5 h-5" /></button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-xl mx-auto w-full px-6 py-4 flex-grow">
                        <AnimatePresence mode="wait">
                            {showHistory ? (
                                <motion.div key="history" initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -20 }} className="space-y-6">
                                    <div className="flex items-center justify-between">
                                        <h2 className="text-xl font-bold flex items-center gap-2"><Icon name="History" className="w-5 h-5 text-emerald-500" /> Historia</h2>
                                        <button onClick={() => { historyService.clearHistory(); setHistory([]); }} className="text-xs text-red-500/70">Wyczyść</button>
                                    </div>
                                    <div className="space-y-3">
                                        {history.length === 0 ? <div className="text-center py-12 text-zinc-500">Brak historii.</div> : history.map(item => (
                                            <div key={item.id} onClick={() => { setImage(item.image); setTextDescription(item.description); setResult(item.result); setShowHistory(false); }} className="bg-zinc-900/50 border border-white/5 rounded-2xl p-4 flex items-center gap-4 cursor-pointer hover:bg-zinc-800/50">
                                                <div className="w-12 h-12 rounded-xl bg-zinc-800 overflow-hidden flex-shrink-0">
                                                    {item.image ? <img src={item.image} className="w-full h-full object-cover" /> : <Icon name="Mic" className="w-5 h-5 text-emerald-500 m-3" />}
                                                </div>
                                                <div className="flex-grow min-w-0">
                                                    <h3 className="text-sm font-bold truncate">{item.result.products?.[0]?.productName || "Produkt"}</h3>
                                                    <p className="text-[10px] text-zinc-500">{new Date(item.timestamp).toLocaleString()}</p>
                                                </div>
                                                <Icon name="ChevronRight" className="w-4 h-4 text-emerald-500" />
                                            </div>
                                        ))}
                                    </div>
                                </motion.div>
                            ) : !image && !textDescription && !isAnalyzing ? (
                                <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="space-y-8">
                                    <div className="text-center py-4"><h2 className="text-3xl font-light">Sprawdź produkt</h2></div>
                                    <div className="grid gap-4">
                                        <button onClick={() => setIsCameraOpen(true)} className="bg-zinc-900 border border-white/10 rounded-3xl p-8 flex flex-col items-center gap-4 hover:border-emerald-500/50">
                                            <Icon name="Camera" className="w-10 h-10 text-emerald-500" />
                                            <span className="text-lg font-medium">Zrób zdjęcie etykiety</span>
                                        </button>
                                        <div className="grid grid-cols-2 gap-4">
                                            <button onClick={() => isRecording ? stopRecording() : startRecording()} className={`rounded-3xl border p-6 flex flex-col items-center gap-3 ${isRecording ? 'bg-emerald-500/10 border-emerald-500/50' : 'bg-zinc-900 border-white/10'}`}>
                                                <Icon name="Mic" className={`w-8 h-8 text-emerald-500 ${isRecording ? 'animate-pulse' : ''}`} />
                                                <span className="text-sm font-medium">{isRecording ? 'Zakończ' : 'Opisz głosowo'}</span>
                                            </button>
                                            <button onClick={() => fileInputRef.current.click()} className="bg-zinc-900 border border-white/10 rounded-3xl p-6 flex flex-col items-center gap-3">
                                                <Icon name="Upload" className="w-8 h-8 text-emerald-500" />
                                                <span className="text-sm font-medium">Z galerii</span>
                                            </button>
                                        </div>
                                    </div>
                                    <input type="file" accept="image/*" className="hidden" ref={fileInputRef} onChange={(e) => {
                                        const file = e.target.files[0];
                                        if (file) {
                                            const reader = new FileReader();
                                            reader.onloadend = () => { setImage(reader.result); analyzeProduct(reader.result); };
                                            reader.readAsDataURL(file);
                                        }
                                    }} />
                                </motion.div>
                            ) : (
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="space-y-6">
                                    <div className="relative aspect-square rounded-3xl overflow-hidden border border-white/10 bg-zinc-900">
                                        {image ? <img src={image} className="w-full h-full object-cover" /> : <div className="w-full h-full flex flex-col items-center justify-center p-8 text-center gap-4"><Icon name="Mic" className="w-12 h-12 text-emerald-500" /><p className="text-lg italic">"{textDescription}"</p></div>}
                                        {isAnalyzing && <div className="absolute inset-0 bg-black/60 backdrop-blur-md flex flex-col items-center justify-center gap-4"><Icon name="Loader2" className="w-10 h-10 text-emerald-500 animate-spin" /><p className="text-lg">Analizowanie...</p></div>}
                                    </div>
                                    {error && <div className="p-4 rounded-2xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm flex gap-3"><Icon name="AlertTriangle" className="w-5 h-5" />{error}</div>}
                                    {result && (
                                        <div className="space-y-6 pb-12">
                                            {result.isComparison && <div className="bg-emerald-500/10 border border-emerald-500/30 rounded-3xl p-6"><h3 className="text-lg font-bold text-emerald-400 mb-2">Werdykt</h3><p className="text-sm text-zinc-300 mb-4">{result.comparisonSummary}</p><div className="bg-zinc-900/50 p-4 rounded-2xl border border-emerald-500/20"><p className="text-emerald-400 font-bold">{result.recommendation}</p></div></div>}
                                            <div className={`grid gap-6 ${result.products.length > 1 ? 'md:grid-cols-2' : ''}`}>
                                                {result.products.map((p, i) => (
                                                    <div key={i} className="bg-zinc-900 border border-white/10 rounded-3xl overflow-hidden">
                                                        <div className={`p-6 ${p.verdict === 'KUPUJ' ? 'bg-emerald-500/5' : p.verdict === 'UNIKAJ' ? 'bg-red-500/5' : 'bg-amber-500/5'}`}>
                                                            <div className="flex justify-between items-start mb-4">
                                                                <div className="flex items-center gap-3">
                                                                    <Icon name={p.verdict === 'KUPUJ' ? 'ShieldCheck' : p.verdict === 'UNIKAJ' ? 'ShieldAlert' : 'ShieldQuestion'} className={`w-6 h-6 ${p.verdict === 'KUPUJ' ? 'text-emerald-500' : p.verdict === 'UNIKAJ' ? 'text-red-500' : 'text-amber-500'}`} />
                                                                    <div><h3 className="text-lg font-black italic">{p.verdict}</h3><p className="text-[10px] opacity-60 uppercase">{p.productName}</p></div>
                                                                </div>
                                                                <div className="text-right"><div className="text-xl font-bold">{p.healthScore}%</div><div className="text-[8px] opacity-50">Score</div></div>
                                                            </div>
                                                            <p className="text-xs italic text-zinc-400">"{p.summary}"</p>
                                                        </div>
                                                        <div className="p-6 space-y-6">
                                                            <div className="space-y-4">
                                                                <div><h4 className="text-[10px] font-bold uppercase text-zinc-500 mb-2">Zalety</h4><ul className="space-y-1">{p.pros.map((pro, j) => <li key={j} className="text-xs text-zinc-300 flex gap-2"><span className="text-emerald-500">•</span>{pro}</li>)}</ul></div>
                                                                <div><h4 className="text-[10px] font-bold uppercase text-zinc-500 mb-2">Wady</h4><ul className="space-y-1">{p.cons.map((con, j) => <li key={j} className="text-xs text-zinc-300 flex gap-2"><span className="text-red-500">•</span>{con}</li>)}</ul></div>
                                                            </div>
                                                            <div className="pt-4 border-t border-white/5 space-y-4">
                                                                <h4 className="text-[10px] font-bold uppercase text-zinc-500">Składniki</h4>
                                                                <div className="space-y-2">{p.detailedRisks.map((r, j) => (
                                                                    <div key={j} className="p-3 rounded-xl bg-zinc-800/30 border border-white/5">
                                                                        <div className="flex justify-between items-center mb-1"><span className="text-xs font-bold">{r.ingredient}</span><span className={`text-[8px] font-bold px-1.5 py-0.5 rounded ${r.riskLevel === 'HIGH' ? 'bg-red-500/20 text-red-400' : r.riskLevel === 'MEDIUM' ? 'bg-amber-500/20 text-amber-400' : 'bg-emerald-500/20 text-emerald-400'}`}>{r.riskLevel}</span></div>
                                                                        <p className="text-[10px] text-zinc-400">{r.reason}</p>
                                                                    </div>
                                                                ))}</div>
                                                                <div className="bg-emerald-500/5 border border-emerald-500/10 rounded-2xl p-4"><h4 className="text-[10px] font-bold uppercase text-emerald-500/70 mb-2">Dopasowanie</h4><p className="text-[11px] italic">"{p.protocolFit}"</p></div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                            <button onClick={reset} className="w-full py-4 rounded-2xl border border-white/10 text-zinc-400 font-medium hover:bg-white/5 flex items-center justify-center gap-2"><Icon name="RefreshCw" className="w-4 h-4" /> Nowy skan</button>
                                        </div>
                                    )}
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>

                    {isCameraOpen && <CameraView onCapture={(data) => { setImage(data); setIsCameraOpen(false); analyzeProduct(data); }} onClose={() => setIsCameraOpen(false)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
